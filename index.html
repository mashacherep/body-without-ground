<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>body without ground</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #050508; }
  canvas { display: block; }
  #narrative-overlay {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    pointer-events: none;
    z-index: 10;
  }
  #narrative-heading {
    font-family: Impact, 'Helvetica Neue', Helvetica, Arial, sans-serif;
    font-size: clamp(2rem, 6vw, 5rem);
    color: #fff;
    text-align: center;
    max-width: 80vw;
    line-height: 1.15;
    opacity: 0;
    transition: opacity 0.8s ease-in-out;
    text-transform: lowercase;
    letter-spacing: -0.02em;
  }
  #narrative-subtitle {
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    font-size: clamp(0.9rem, 2vw, 1.4rem);
    color: rgba(255, 255, 255, 0.6);
    text-align: center;
    max-width: 60vw;
    margin-top: 1rem;
    opacity: 0;
    transition: opacity 0.8s ease-in-out;
    font-weight: 300;
  }
  #narrative-heading.visible,
  #narrative-subtitle.visible {
    opacity: 1;
  }

  /* Whisper panel — ambient text from nearby cells */
  #whisper-panel {
    position: fixed;
    bottom: 24px;
    left: 24px;
    max-width: 380px;
    z-index: 8;
    pointer-events: none;
    opacity: 0;
    transition: opacity 1.5s ease-in-out;
  }
  #whisper-panel.visible { opacity: 1; }
  #whisper-type {
    font-family: 'Courier New', monospace;
    font-size: 9px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.2);
    margin-bottom: 6px;
  }
  #whisper-text {
    font-family: Georgia, 'Times New Roman', serif;
    font-size: 14px;
    line-height: 1.65;
    color: rgba(255,255,255,0.45);
    font-style: italic;
  }
  #whisper-panel.type-ukraine #whisper-text {
    color: rgba(228,172,68,0.55);
    font-style: normal;
  }
  #whisper-panel.type-essay #whisper-text {
    font-family: 'Courier New', monospace;
    font-size: 12px;
    color: rgba(175,148,240,0.45);
    font-style: normal;
  }

  /* Kyiv/NYC clock HUD */
  #clock-hud {
    position: fixed;
    top: 16px;
    right: 20px;
    z-index: 8;
    pointer-events: none;
    font-family: 'Courier New', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-align: right;
    line-height: 1.8;
  }
  #kyiv-clock { color: rgba(220,165,55,0.5); }
  #nyc-clock { color: rgba(120,165,220,0.4); }
  #alert-badge {
    color: rgba(255,80,60,0.7);
    font-size: 8px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    display: none;
    animation: alertPulse 1.5s ease-in-out infinite;
  }
  #alert-badge.active { display: block; }
  @keyframes alertPulse { 0%,100% { opacity: 0.4; } 50% { opacity: 1; } }

  #reading-overlay {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 20;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.6s ease-in-out;
  }
  #reading-overlay.visible {
    opacity: 1;
    pointer-events: auto;
  }
  #reading-panel {
    max-width: 600px;
    width: 90vw;
    max-height: 80vh;
    overflow-y: auto;
    padding: 2rem;
    /* No borders, no background — content floats on the dimmed cosmos */
  }
  /* Scrollbar styling — near-invisible */
  #reading-panel::-webkit-scrollbar { width: 2px; }
  #reading-panel::-webkit-scrollbar-track { background: transparent; }
  #reading-panel::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 1px; }

  #reading-type {
    font-family: 'Courier New', monospace;
    font-size: 9px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.2);
    margin-bottom: 1.5rem;
  }
  #reading-content {
    /* Base — overridden per type by JS classes */
    color: rgba(245,238,220,0.85);
    line-height: 1.7;
  }
  #reading-assumptions {
    font-family: 'Courier New', monospace;
    font-size: 11px;
    font-style: italic;
    color: rgba(220,80,60,0.6);
    margin-top: 2rem;
    opacity: 0;
    transition: opacity 0.8s ease-in-out;
  }
  #reading-assumptions.visible { opacity: 1; }
  #reading-meta {
    font-family: 'Courier New', monospace;
    font-size: 8px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.12);
    margin-top: 2rem;
  }

  /* Text type styles applied to #reading-content */
  #reading-content.type-poem {
    font-family: Georgia, 'Times New Roman', serif;
    font-style: italic;
    font-size: 24px;
    line-height: 1.65;
    color: rgba(245,238,220,0.8);
    white-space: pre-line;
  }
  #reading-content.type-essay {
    font-family: 'Courier New', monospace;
    font-size: 14px;
    line-height: 1.8;
    color: rgba(175,148,240,0.75);
    max-width: 640px;
  }
  #reading-content.type-ukraine {
    font-family: 'Courier New', monospace;
    font-size: 16px;
    line-height: 1.7;
    color: rgba(228,172,68,0.85);
  }
  #reading-content.type-ascii {
    font-family: 'Courier New', monospace;
    font-size: 16px;
    line-height: 1.3;
    color: rgba(80,145,215,0.75);
    white-space: pre;
    letter-spacing: 0.05em;
  }
  #reading-content.type-about {
    font-family: Georgia, 'Times New Roman', serif;
    font-size: 18px;
    line-height: 1.8;
    color: rgba(245,240,230,0.85);
  }
  #reading-content.type-viz {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1.5rem;
  }
  #reading-content.type-viz canvas {
    display: block;
    max-width: 480px;
    width: 100%;
    image-rendering: auto;
    border-radius: 2px;
  }
  #reading-content.type-viz .viz-caption {
    font-family: Georgia, 'Times New Roman', serif;
    font-style: italic;
    font-size: 14px;
    line-height: 1.7;
    color: rgba(245,238,220,0.55);
    max-width: 440px;
    text-align: center;
  }

  /* Ukraine clock in reading view */
  .reading-kyiv-clock {
    font-family: 'Courier New', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    color: rgba(220,165,55,0.5);
    margin-top: 0.5rem;
  }
</style>
</head>
<body>
<!-- Narrative overlay -->
<div id="narrative-overlay" aria-live="polite">
  <div id="narrative-heading"></div>
  <div id="narrative-subtitle"></div>
</div>
<!-- Whisper panel — shows text from nearby cells -->
<div id="whisper-panel">
  <div id="whisper-type"></div>
  <div id="whisper-text"></div>
</div>

<!-- Clock HUD -->
<div id="clock-hud">
  <div id="kyiv-clock">KYIV --:--</div>
  <div id="nyc-clock">NYC --:--</div>
  <div id="alert-badge">AIR RAID ALERT — KYIV</div>
</div>

<!-- Reading view overlay -->
<div id="reading-overlay" aria-live="polite">
  <div id="reading-panel">
    <div id="reading-type"></div>
    <div id="reading-content"></div>
    <div id="reading-assumptions"></div>
    <div id="reading-meta"></div>
  </div>
</div>
<script type="module" src="/src/main.js"></script>
</body>
</html>
