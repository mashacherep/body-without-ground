<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>body without ground</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@200;300&family=Space+Mono&family=Inter:wght@300;400&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a0f; }
  canvas { display: block; }
  #narrative-overlay {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    pointer-events: none;
    z-index: 10;
  }
  #narrative-heading {
    font-family: 'Oswald', sans-serif;
    font-weight: 200;
    font-size: clamp(2.5rem, 7vw, 6rem);
    color: rgba(220, 215, 205, 0.50);
    text-align: center;
    max-width: 80vw;
    line-height: 0.95;
    opacity: 0;
    transition: opacity 0.8s ease-in-out;
    text-transform: uppercase;
    letter-spacing: -0.02em;
  }
  #narrative-subtitle {
    font-family: 'Inter', sans-serif;
    font-weight: 300;
    font-size: clamp(0.8rem, 1.5vw, 1.1rem);
    color: rgba(245, 240, 228, 0.28);
    text-align: center;
    max-width: 60vw;
    margin-top: 1rem;
    opacity: 0;
    transition: opacity 0.8s ease-in-out;
    letter-spacing: 0.03em;
    line-height: 1.7;
  }
  #narrative-heading.visible,
  #narrative-subtitle.visible {
    opacity: 1;
  }

  /* Whisper panel — top left corner */
  #whisper-panel {
    position: fixed;
    top: 20px;
    left: 24px;
    max-width: 280px;
    z-index: 8;
    pointer-events: none;
    opacity: 0;
    transition: opacity 1.5s ease-in-out;
  }
  #whisper-panel.visible { opacity: 1; }
  #whisper-panel::after {
    content: '';
    display: block;
    width: 80px;
    height: 1px;
    background: linear-gradient(to right, rgba(255,255,255,0.15), transparent);
    margin-top: 8px;
  }
  #whisper-type {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.30);
    margin-bottom: 6px;
  }
  #whisper-text {
    font-family: 'Inter', sans-serif;
    font-weight: 300;
    font-size: 12px;
    line-height: 1.6;
    color: rgba(255,255,255,0.35);
  }

  /* Kyiv/NYC clock HUD */
  #clock-hud {
    position: fixed;
    top: 20px;
    right: 24px;
    z-index: 8;
    pointer-events: none;
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    text-align: right;
    line-height: 1.8;
  }
  #kyiv-clock { color: rgba(255,255,255,0.50); }
  #nyc-clock { color: rgba(255,255,255,0.40); }
  #clock-hud::after {
    content: '';
    display: block;
    width: 80px;
    height: 1px;
    background: linear-gradient(to left, rgba(255,255,255,0.15), transparent);
    margin-top: 8px;
    margin-left: auto;
  }

  /* Bottom-left vitals */
  #vitals-hud {
    position: fixed;
    bottom: 20px;
    left: 24px;
    z-index: 8;
    pointer-events: none;
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.50);
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  #vitals-hud::before {
    content: '';
    display: block;
    width: 80px;
    height: 1px;
    background: linear-gradient(to right, rgba(255,255,255,0.15), transparent);
    margin-bottom: 8px;
  }

  /* Bottom-right alert corner */
  #alert-corner {
    position: fixed;
    bottom: 20px;
    right: 24px;
    z-index: 8;
    pointer-events: none;
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.40);
    text-align: right;
  }
  #alert-corner::before {
    content: '';
    display: block;
    width: 80px;
    height: 1px;
    background: linear-gradient(to left, rgba(255,255,255,0.15), transparent);
    margin-bottom: 8px;
    margin-left: auto;
  }

  /* Alert badge */
  #alert-badge {
    color: rgba(228, 172, 68, 0.7);
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    display: none;
  }
  #alert-badge.active { display: block; }

  /* Generation feed — shows new content briefly */
  #gen-feed {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 9;
    pointer-events: none;
    max-width: 70vw;
    text-align: center;
    opacity: 0;
    transition: opacity 1.2s;
  }
  #gen-feed.visible { opacity: 1; }
  #gen-feed-type {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.20);
    margin-bottom: 10px;
  }
  #gen-feed-text {
    font-family: 'Inter', sans-serif;
    font-weight: 300;
    font-size: clamp(1.2rem, 2.8vw, 2rem);
    color: rgba(245,238,220,0.50);
    font-style: normal;
    line-height: 1.7;
    max-width: 65vw;
  }
  #gen-feed-text .token-high { color: rgba(245,238,220,0.55); }
  #gen-feed-text .token-mid  { color: rgba(245,238,220,0.35); }
  #gen-feed-text .token-low  { color: rgba(200,80,60,0.50); }

  /* Prompt transparency panel */
  #gen-feed-prompt {
    font-family: 'Space Mono', monospace;
    font-size: 7px;
    letter-spacing: 0.08em;
    color: rgba(255,255,255,0.15);
    margin-top: 12px;
    line-height: 1.8;
    max-width: 50vw;
    text-align: center;
    pointer-events: none;
  }

  #reading-overlay {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 20;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.6s ease-in-out;
  }
  #reading-overlay.visible {
    opacity: 1;
    pointer-events: auto;
  }
  #reading-panel {
    max-width: 600px;
    width: 90vw;
    max-height: 80vh;
    overflow-y: auto;
    padding: 2rem;
    /* No borders, no background — content floats on the dimmed cosmos */
  }
  /* Scrollbar styling — near-invisible */
  #reading-panel::-webkit-scrollbar { width: 2px; }
  #reading-panel::-webkit-scrollbar-track { background: transparent; }
  #reading-panel::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 1px; }

  #reading-type {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.2);
    margin-bottom: 1.5rem;
  }
  #reading-content {
    /* Base — overridden per type by JS classes */
    color: rgba(245,238,220,0.85);
    line-height: 1.7;
  }
  #reading-assumptions {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    font-style: italic;
    color: rgba(220,80,60,0.6);
    margin-top: 2rem;
    opacity: 0;
    transition: opacity 0.8s ease-in-out;
  }
  #reading-assumptions.visible { opacity: 1; }
  #reading-meta {
    font-family: 'Space Mono', monospace;
    font-size: 8px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.12);
    margin-top: 2rem;
  }

  /* Text type styles applied to #reading-content */
  #reading-content.type-poem {
    font-family: 'Inter', sans-serif;
    font-weight: 300;
    font-style: italic;
    font-size: 24px;
    line-height: 1.65;
    color: rgba(245,238,220,0.8);
    white-space: pre-line;
  }
  #reading-content.type-essay {
    font-family: 'Space Mono', monospace;
    font-size: 14px;
    line-height: 1.8;
    color: rgba(175,148,240,0.75);
    max-width: 640px;
  }
  #reading-content.type-ukraine {
    font-family: 'Space Mono', monospace;
    font-size: 16px;
    line-height: 1.7;
    color: rgba(228,172,68,0.85);
  }
  #reading-content.type-ascii {
    font-family: 'Space Mono', monospace;
    font-size: 16px;
    line-height: 1.3;
    color: rgba(80,145,215,0.75);
    white-space: pre;
    letter-spacing: 0.05em;
  }
  #reading-content.type-about {
    font-family: 'Inter', sans-serif;
    font-weight: 300;
    font-size: 18px;
    line-height: 1.8;
    color: rgba(245,240,230,0.85);
  }
  #reading-content.type-viz {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1.5rem;
  }
  #reading-content.type-viz canvas {
    display: block;
    max-width: 480px;
    width: 100%;
    image-rendering: auto;
    border-radius: 2px;
  }
  #reading-content.type-viz .viz-caption {
    font-family: 'Inter', sans-serif;
    font-weight: 300;
    font-style: italic;
    font-size: 14px;
    line-height: 1.7;
    color: rgba(245,238,220,0.55);
    max-width: 440px;
    text-align: center;
  }

  /* Controls hint — shown after intro, fades out */
  #controls-hint {
    position: fixed;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 11;
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.15);
    pointer-events: none;
    opacity: 0;
    transition: opacity 1.5s ease-in-out;
    white-space: nowrap;
  }
  #controls-hint.visible { opacity: 1; }

  #sound-prompt {
    position: fixed;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 12;
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.18);
    pointer-events: none;
    opacity: 0;
    transition: opacity 1.5s;
  }
  #sound-prompt.visible { opacity: 1; }

  /* Ukraine clock in reading view */
  .reading-kyiv-clock {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    color: rgba(255,255,255,0.50);
    margin-top: 0.5rem;
  }
</style>
</head>
<body>
<!-- Narrative overlay -->
<div id="narrative-overlay" aria-live="polite">
  <div id="narrative-heading"></div>
  <div id="narrative-subtitle"></div>
</div>
<!-- Whisper panel — shows text from nearby cells -->
<div id="whisper-panel">
  <div id="whisper-type"></div>
  <div id="whisper-text"></div>
</div>

<!-- Clock HUD -->
<div id="clock-hud">
  <div id="kyiv-clock">KYIV --:--</div>
  <div id="nyc-clock">NYC --:--</div>
</div>

<!-- Bottom corners -->
<div id="vitals-hud"></div>
<div id="alert-corner">
  <div id="alert-status">ALERT · CLEAR</div>
  <div id="alert-badge">ALERT · ACTIVE — KYIV</div>
</div>

<!-- Generation feed -->
<div id="gen-feed">
  <div id="gen-feed-type"></div>
  <div id="gen-feed-text"></div>
  <div id="gen-feed-prompt"></div>
</div>

<div id="controls-hint">scroll to fly · drag to look · double-click to read</div>
<div id="sound-prompt">click anywhere to let the garden breathe</div>
<!-- Reading view overlay -->
<div id="reading-overlay" aria-live="polite">
  <div id="reading-panel">
    <div id="reading-type"></div>
    <div id="reading-content"></div>
    <div id="reading-assumptions"></div>
    <div id="reading-meta"></div>
  </div>
</div>
<script type="module" src="/src/main.js"></script>
</body>
</html>
