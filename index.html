<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>body without ground</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&family=Inter:wght@300;400&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #050508; }
  canvas { display: block; }
  #narrative-overlay {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    pointer-events: none;
    z-index: 10;
  }
  #narrative-heading {
    font-family: Impact, 'Arial Narrow', Helvetica, sans-serif;
    font-size: clamp(2.2rem, 6.5vw, 5.5rem);
    color: rgba(220, 215, 205, 0.85);
    text-align: center;
    max-width: 80vw;
    line-height: 0.95;
    opacity: 0;
    transition: opacity 0.8s ease-in-out;
    text-transform: uppercase;
    letter-spacing: 0.02em;
  }
  #narrative-subtitle {
    font-family: 'Courier New', monospace;
    font-size: clamp(0.75rem, 1.5vw, 1.1rem);
    color: rgba(245, 240, 228, 0.35);
    text-align: center;
    max-width: 60vw;
    margin-top: 1rem;
    opacity: 0;
    transition: opacity 0.8s ease-in-out;
    letter-spacing: 0.04em;
    line-height: 1.7;
  }
  #narrative-heading.visible,
  #narrative-subtitle.visible {
    opacity: 1;
  }

  /* Whisper panel — ambient text from nearby cells */
  #whisper-panel {
    position: fixed;
    bottom: 24px;
    left: 24px;
    max-width: 380px;
    z-index: 8;
    pointer-events: none;
    opacity: 0;
    transition: opacity 1.5s ease-in-out;
  }
  #whisper-panel.visible { opacity: 1; }
  #whisper-type {
    font-family: 'Courier New', monospace;
    font-size: 9px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.2);
    margin-bottom: 6px;
  }
  #whisper-text {
    font-family: Georgia, 'Times New Roman', serif;
    font-size: 14px;
    line-height: 1.65;
    color: rgba(255,255,255,0.45);
    font-style: italic;
  }
  #whisper-panel.type-ukraine #whisper-text {
    color: rgba(228,172,68,0.55);
    font-style: normal;
  }
  #whisper-panel.type-essay #whisper-text {
    font-family: 'Courier New', monospace;
    font-size: 12px;
    color: rgba(175,148,240,0.45);
    font-style: normal;
  }

  /* Kyiv/NYC clock HUD */
  #clock-hud {
    position: fixed;
    top: 16px;
    right: 20px;
    z-index: 8;
    pointer-events: none;
    font-family: 'Courier New', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-align: right;
    line-height: 1.8;
  }
  #kyiv-clock { color: rgba(220,165,55,0.5); }
  #nyc-clock { color: rgba(120,165,220,0.4); }

  /* Machine vitals HUD — bottom right */
  #vitals-hud {
    position: fixed;
    bottom: 20px;
    right: 20px;
    z-index: 8;
    pointer-events: none;
    font-family: 'Courier New', monospace;
    font-size: 8px;
    letter-spacing: 0.06em;
    color: rgba(255,255,255,0.18);
    text-align: right;
    line-height: 1.9;
  }

  /* Assumptions counter — bottom center */
  #assumptions-counter {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 8;
    pointer-events: none;
    font-family: 'Courier New', monospace;
    font-size: 9px;
    letter-spacing: 0.08em;
    color: rgba(200,62,42,0.3);
    text-align: center;
    opacity: 0;
    transition: opacity 2s;
  }
  #assumptions-counter.visible { opacity: 1; }

  /* Generation feed — shows new content briefly */
  #gen-feed {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 9;
    pointer-events: none;
    max-width: 70vw;
    text-align: center;
    opacity: 0;
    transition: opacity 1.2s;
  }
  #gen-feed.visible { opacity: 1; }
  #gen-feed-text {
    font-family: Georgia, serif;
    font-size: clamp(1rem, 2.5vw, 1.6rem);
    color: rgba(245,238,220,0.5);
    font-style: italic;
    line-height: 1.7;
  }
  #gen-feed-type {
    font-family: 'Courier New', monospace;
    font-size: 8px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.15);
    margin-bottom: 8px;
  }
  #alert-badge {
    color: rgba(255,80,60,0.7);
    font-size: 8px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    display: none;
    animation: alertPulse 1.5s ease-in-out infinite;
  }
  #alert-badge.active { display: block; }
  @keyframes alertPulse { 0%,100% { opacity: 0.4; } 50% { opacity: 1; } }

  #reading-overlay {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 20;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.6s ease-in-out;
  }
  #reading-overlay.visible {
    opacity: 1;
    pointer-events: auto;
  }
  #reading-panel {
    max-width: 600px;
    width: 90vw;
    max-height: 80vh;
    overflow-y: auto;
    padding: 2rem;
    /* No borders, no background — content floats on the dimmed cosmos */
  }
  /* Scrollbar styling — near-invisible */
  #reading-panel::-webkit-scrollbar { width: 2px; }
  #reading-panel::-webkit-scrollbar-track { background: transparent; }
  #reading-panel::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 1px; }

  #reading-type {
    font-family: 'Courier New', monospace;
    font-size: 9px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.2);
    margin-bottom: 1.5rem;
  }
  #reading-content {
    /* Base — overridden per type by JS classes */
    color: rgba(245,238,220,0.85);
    line-height: 1.7;
  }
  #reading-assumptions {
    font-family: 'Courier New', monospace;
    font-size: 11px;
    font-style: italic;
    color: rgba(220,80,60,0.6);
    margin-top: 2rem;
    opacity: 0;
    transition: opacity 0.8s ease-in-out;
  }
  #reading-assumptions.visible { opacity: 1; }
  #reading-meta {
    font-family: 'Courier New', monospace;
    font-size: 8px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.12);
    margin-top: 2rem;
  }

  /* Text type styles applied to #reading-content */
  #reading-content.type-poem {
    font-family: Georgia, 'Times New Roman', serif;
    font-style: italic;
    font-size: 24px;
    line-height: 1.65;
    color: rgba(245,238,220,0.8);
    white-space: pre-line;
  }
  #reading-content.type-essay {
    font-family: 'Courier New', monospace;
    font-size: 14px;
    line-height: 1.8;
    color: rgba(175,148,240,0.75);
    max-width: 640px;
  }
  #reading-content.type-ukraine {
    font-family: 'Courier New', monospace;
    font-size: 16px;
    line-height: 1.7;
    color: rgba(228,172,68,0.85);
  }
  #reading-content.type-ascii {
    font-family: 'Courier New', monospace;
    font-size: 16px;
    line-height: 1.3;
    color: rgba(80,145,215,0.75);
    white-space: pre;
    letter-spacing: 0.05em;
  }
  #reading-content.type-about {
    font-family: Georgia, 'Times New Roman', serif;
    font-size: 18px;
    line-height: 1.8;
    color: rgba(245,240,230,0.85);
  }
  #reading-content.type-viz {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1.5rem;
  }
  #reading-content.type-viz canvas {
    display: block;
    max-width: 480px;
    width: 100%;
    image-rendering: auto;
    border-radius: 2px;
  }
  #reading-content.type-viz .viz-caption {
    font-family: Georgia, 'Times New Roman', serif;
    font-style: italic;
    font-size: 14px;
    line-height: 1.7;
    color: rgba(245,238,220,0.55);
    max-width: 440px;
    text-align: center;
  }

  #sound-prompt {
    position: fixed;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 12;
    font-family: 'Courier New', monospace;
    font-size: 10px;
    letter-spacing: 0.12em;
    color: rgba(255,255,255,0.2);
    pointer-events: none;
    opacity: 0;
    transition: opacity 1.5s;
  }
  #sound-prompt.visible { opacity: 1; }

  /* Prompt transparency panel — raw inputs that produced the output */
  #gen-feed-prompt {
    font-family: 'Courier New', monospace;
    font-size: 7px;
    letter-spacing: 0.06em;
    color: rgba(210,170,80,0.25);
    margin-top: 12px;
    line-height: 1.8;
    max-width: 50vw;
    text-align: center;
    pointer-events: none;
  }

  /* Token confidence coloring — applied per-span in gen-feed-text */
  #gen-feed-text .token-high { color: rgba(245,238,220,0.55); }
  #gen-feed-text .token-mid  { color: rgba(245,238,220,0.3); }
  #gen-feed-text .token-low  { color: rgba(220,70,50,0.65); }

  /* Assumptions ledger — persistent scrollable log */
  #assumptions-ledger {
    position: fixed;
    bottom: 60px;
    right: 20px;
    z-index: 8;
    pointer-events: none;
    font-family: 'Courier New', monospace;
    font-size: 8px;
    letter-spacing: 0.04em;
    color: rgba(220,70,50,0.3);
    text-align: right;
    max-width: 280px;
    max-height: 120px;
    overflow: hidden;
    line-height: 1.7;
  }
  #assumptions-ledger .ledger-count {
    color: rgba(220,70,50,0.4);
    margin-bottom: 4px;
    font-size: 7px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  #assumptions-ledger .ledger-item {
    opacity: 0;
    transition: opacity 1.5s ease-in;
    color: rgba(220,70,50,0.22);
  }
  #assumptions-ledger .ledger-item.visible {
    opacity: 1;
  }

  /* Ukraine clock in reading view */
  .reading-kyiv-clock {
    font-family: 'Courier New', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    color: rgba(220,165,55,0.5);
    margin-top: 0.5rem;
  }
</style>
</head>
<body>
<!-- Narrative overlay -->
<div id="narrative-overlay" aria-live="polite">
  <div id="narrative-heading"></div>
  <div id="narrative-subtitle"></div>
</div>
<!-- Whisper panel — shows text from nearby cells -->
<div id="whisper-panel">
  <div id="whisper-type"></div>
  <div id="whisper-text"></div>
</div>

<!-- Clock HUD + Ukraine minimap -->
<div id="clock-hud">
  <div id="kyiv-clock">KYIV --:--</div>
  <div id="nyc-clock">NYC --:--</div>
  <div id="alert-badge">AIR RAID ALERT — KYIV</div>
</div>

<!-- Machine vitals HUD -->
<div id="vitals-hud"></div>

<!-- Assumptions counter -->
<div id="assumptions-counter"></div>

<!-- Generation feed -->
<div id="gen-feed">
  <div id="gen-feed-type"></div>
  <div id="gen-feed-text"></div>
  <div id="gen-feed-prompt"></div>
</div>

<!-- Assumptions ledger — persistent log of invented facts -->
<div id="assumptions-ledger"></div>

<div id="sound-prompt">click anywhere to let the garden breathe</div>
<!-- Reading view overlay -->
<div id="reading-overlay" aria-live="polite">
  <div id="reading-panel">
    <div id="reading-type"></div>
    <div id="reading-content"></div>
    <div id="reading-assumptions"></div>
    <div id="reading-meta"></div>
  </div>
</div>
<script type="module" src="/src/main.js"></script>
</body>
</html>
