// Drift animation loop
function driftFrame() {
  var WORLD_W = 3200, WORLD_H = 2400;
  for (var i = 0; i < driftNodes.length; i++) {
    var n = driftNodes[i];
    n.x += n.vx;
    n.y += n.vy;
    n.age++;
    if (n.x < -200) n.x = WORLD_W - 50;
    if (n.x > WORLD_W + 200) n.x = 50;
    if (n.y < -200) n.y = WORLD_H - 50;
    if (n.y > WORLD_H + 200) n.y = 50;
    n.el.style.left = n.x + 'px';
    n.el.style.top = n.y + 'px';
  }
  requestAnimationFrame(driftFrame);
}

// ===== GENERATION =====
function sleep(ms) { return new Promise(function(r) { setTimeout(r, ms); }); }

async function generate() {
  if (busy) return;
  busy = true;
  genCount++;

  var type = TYPES[(genCount - 1) % TYPES.length];
  var entropy = (Math.random() * 0.9998 + 0.0001).toFixed(9);

  var now = new Date();
  var hour = now.getHours();
  var tod = hour < 5 ? 'deep night' : hour < 9 ? 'early morning' : hour < 12 ? 'morning' : hour < 17 ? 'afternoon' : hour < 21 ? 'evening' : 'night';
  var deviceMem = navigator.deviceMemory || 'unknown';

  document.getElementById('entropy-display').textContent = 'e:' + entropy.slice(0, 7);
  document.getElementById('bar-status').textContent = type + ' — reading machine...';

  // Measure generation start time (latency as creative material)

    var parsed;

async function showGenerationOverlay(type, parsed, entropy, latency, latencyLabel) {
  var overlay = document.getElementById('gen-overlay');
  var contentEl = document.getElementById('gen-content');
  var asmsEl = document.getElementById('gen-assumptions');
  var asmBlock = document.getElementById('gen-assumptions-block');

  contentEl.innerHTML = '';
  asmsEl.innerHTML = '';
  asmBlock.style.opacity = '0';

  // Style based on type
  var isMono = (type === 'ascii' || type === 'essay');
  contentEl.className = isMono ? 'mono' : '';

  overlay.classList.add('show');

  // Type out content
  var lines = (parsed.content || '').split('\n').filter(function(l) { return l.trim(); });
  var out = '';
  contentEl.innerHTML = '<span class="cursor-blink"></span>';

  for (var li = 0; li < lines.length; li++) {
    var line = lines[li];
    for (var ci = 0; ci < line.length; ci++) {
      out += line[ci];
      contentEl.innerHTML = out.replace(/\n/g, '<br>') + '<span class="cursor-blink"></span>';
      await sleep(isMono ? 12 : 16 + Math.random() * 22);
    }
    out += '\n';
    contentEl.innerHTML = out.replace(/\n/g, '<br>') + '<span class="cursor-blink"></span>';
    await sleep(100);
  }
  contentEl.innerHTML = out.replace(/\n/g, '<br>');

  // Show assumptions
  await sleep(350);
  asmBlock.style.opacity = '1';
  var asms = parsed.assumptions || [];
  for (var ai = 0; ai < asms.length; ai++) {
    var d = document.createElement('div');
    d.className = 'gen-asm';
    d.textContent = asms[ai];
    asmsEl.appendChild(d);
    await sleep(40);
    d.classList.add('on');
    await sleep(320);
  }

  document.getElementById('bar-status').textContent = 'gen ' + String(genCount).padStart(2, '0') + ' — release to grid';
}

function dismissGeneration() {
  var overlay = document.getElementById('gen-overlay');
  overlay.classList.remove('show');

  if (pendingGen) {
    createCellElement(pendingGen);
    extractWords(pendingGen.content);

    // Track assumptions
    if (pendingGen.assumptions) {
      allAssumptions = allAssumptions.concat(pendingGen.assumptions);
    }

    // Show rotating statement
    stmtIdx = (stmtIdx + 1) % STMTS.length;
    var stmt = STMTS[stmtIdx];
    setTimeout(function() { showStatement(stmt.h, stmt.s, 6500); }, 300);

    pendingGen = null;
    finishGeneration(pendingGen ? pendingGen.type : '', '');
  } else {
    busy = false;
  }

  updateCounts();
  saveState();
}

function finishGeneration(type, entropy) {
  document.getElementById('bar-status').textContent = 'universe growing — ' + cells.length + ' cells';
  updateCounts();
  saveState();

  // Show statement for instant types
  if (type === 'conway' || type === 'music') {
    stmtIdx = (stmtIdx + 1) % STMTS.length;
    var stmt = STMTS[stmtIdx];
    setTimeout(function() { showStatement(stmt.h, stmt.s, 5500); }, 200);
  }

  busy = false;
}

function updateCounts() {
  document.getElementById('gen-count').textContent = 'gen ' + genCount;
  document.getElementById('markov-count').textContent = 'markov: ' + worldWords.length + ' words';
  document.getElementById('assumption-count').textContent = 'assumptions: ' + allAssumptions.length;

  // Meta-confession after 10 generations
  if (allAssumptions.length >= 9 && allAssumptions.length % 9 === 0) {
    var note = document.getElementById('ledger-note');
    note.textContent = 'in ' + genCount + ' generations the machine invented ' + allAssumptions.length + ' facts about you. none of them true. it will keep guessing. it has no other option.';
  }
}

// ===== AUTO GENERATION =====
// For auto-gen: instant types (conway, music) don't need overlay
// Text types auto-dismiss after typing finishes
var autoGenTimer = null;

function startAutoGen() {
  if (autoGenTimer) clearInterval(autoGenTimer);
  autoGenTimer = setInterval(function() {
    if (!busy && AUTO_GEN) {
      var nextType = TYPES[genCount % TYPES.length];
      // For auto-gen: skip overlay for text types, go straight to grid
      autoGenerate();
    }
  }, GEN_INTERVAL);
}

async function autoGenerate() {
  if (busy) return;
  busy = true;
  genCount++;

  var type = forceGenType || TYPES[(genCount - 1) % TYPES.length];
  forceGenType = null; // clear override
  var entropy = (Math.random() * 0.9998 + 0.0001).toFixed(9);
  var uptime = Math.round(performance.now());
  var now = new Date();
  var hour = now.getHours();
  var tod = hour < 5 ? 'deep night' : hour < 9 ? 'early morning' : hour < 12 ? 'morning' : hour < 17 ? 'afternoon' : hour < 21 ? 'evening' : 'night';
  var deviceMem = navigator.deviceMemory || 'unknown';

  document.getElementById('entropy-display').textContent = 'e:' + entropy.slice(0, 7);
  document.getElementById('bar-status').textContent = type + ' — auto generating...';

  var genStart = performance.now();

  // Instant types (no API call needed)
  var instantTypes = ['conway','music','attention','embedding','network','weights','gradient','activation','loss','tokenprob','hypergraph','multiway','neuralpass','orbit','wavefunction','stringrewrite','apoptosis','codeself','reactiondiffusion','lsystem','seismic','voronoi'];
  if (instantTypes.indexOf(type) > -1) {
    var vizMetas = {'conway':'conway','music':'melody','attention':'self-attention','embedding':'t-SNE','network':'topology','weights':'W[l] matrix','gradient':'∇L flow','activation':'f(x)','loss':'L(θ) surface','tokenprob':'P(next)','hypergraph':'hypergraph','multiway':'multiway','neuralpass':'forward pass','orbit':'orbit divergence','wavefunction':'ψ(x,t)','stringrewrite':'rule rewrite','apoptosis':'apoptosis','codeself':'self-map','gitnexus':'architecture','reactiondiffusion':'Gray-Scott','lsystem':'L-system','seismic':'USGS','voronoi':'territory'};
    createCellElement({ type: type, content: '', assumptions: [], entropy: entropy, idx: genCount, time: Date.now(), meta: (vizMetas[type]||type) + ' e:' + entropy.slice(0, 6) + ' ' + tod, _nearViewport: true });
    finishAutoGen(type);
    return;
  }

  // Groq types
  var systemMsg = 'Living art installation "body without ground." Masha, Kyiv→NYC, NYU senior, Moveo AI, ex-DressX. War since 2022. Raw JSON only.';
  var alertContext = kyivAlertActive ? ' ACTIVE AIR RAID ALERT IN KYIV RIGHT NOW.' : '';
  var userMsg = '';

  if (type === 'ukraine') {
    userMsg = 'Kyiv transmission. 3-4 lines. City under pressure.' + alertContext + deviceContext() + mourningContext() + ' e:' + entropy + ' ' + tod + ' gen' + genCount + '.' + markovSeed() + ' +3 invented viewer facts. JSON:{"content":"text","assumptions":["1","2","3"]}';
  } else if (type === 'ascii') {
    userMsg = 'ASCII art 6-8 lines, 28 chars wide.' + deviceContext() + ' e:' + entropy + ' ' + tod + '.' + markovSeed() + ' +3 facts. JSON:{"content":"ascii","assumptions":["1","2","3"]}';
  } else if (type === 'essay') {
    userMsg = 'Philosophy fragment. Searle/Nagel/Harnad. Persistence vs biology. War as lived not tokenized.' + alertContext + deviceContext() + mourningContext() + ' e:' + entropy + ' ' + tod + ' gen' + genCount + '.' + markovSeed() + recentContext() + ' 3-4 sentences, lowercase. +3 facts. JSON:{"content":"text","assumptions":["1","2","3"]}';
  } else {
    userMsg = 'Poem. 4-5 lines.' + deviceContext() + mourningContext() + ' e:' + entropy + ' ' + tod + ' gen' + genCount + '.' + alertContext + markovSeed() + recentContext() + ' +3 facts. JSON:{"content":"poem","assumptions":["1","2","3"]}';
  }

  try {
    var res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + GROQ_KEY },
      body: JSON.stringify({
        model: GROQ_MODEL,
        max_tokens: 250,
        temperature: 0.88,
        logprobs: true,
        top_logprobs: 3,
        messages: [{ role: 'system', content: systemMsg }, { role: 'user', content: userMsg }]
      })
    });

    if (!res.ok) throw new Error('groq ' + res.status);
    var data = await res.json();
    var raw = ((data.choices && data.choices[0] && data.choices[0].message && data.choices[0].message.content) || '').trim();

    // Extract REAL logprobs data for visualizations
    var realLogprobs = [];
    try {
      var logContent = data.choices[0].logprobs && data.choices[0].logprobs.content;
      if (logContent) {
        realLogprobs = logContent.map(function(tok) {
          return {
            token: tok.token,
            logprob: tok.logprob,
            topAlts: (tok.top_logprobs || []).map(function(alt) {
              return { token: alt.token, logprob: alt.logprob };
            })
          };
        });
        // Store globally for visualizations to use
        lastRealLogprobs = realLogprobs;
        lastRealTokens = logContent.map(function(t) { return t.token; });
      }
    } catch(lpe) {}

    var parsed;
    try {
      var s = raw.indexOf('{'), e = raw.lastIndexOf('}');
      parsed = JSON.parse(s > -1 && e > s ? raw.slice(s, e + 1) : raw);
    } catch(e2) {
      parsed = { content: raw.slice(0, 200) || 'signal unclear', assumptions: ['unknown origin', 'carries something heavy', 'has been here before'] };
    }

    var latency = Math.round(performance.now() - genStart);
    var latencyLabel = latency < 1000 ? 'fast' : latency < 3000 ? 'steady' : 'slow';
    var tokenCount = realLogprobs.length;

    // Store real generation metrics
    realGenerationHistory.push({
      gen: genCount, type: type, latency: latency,
      tokenCount: tokenCount, entropy: entropy,
      avgLogprob: realLogprobs.length > 0 ? realLogprobs.reduce(function(s,t){return s+t.logprob;},0) / realLogprobs.length : 0,
      time: Date.now()
    });
    if (realGenerationHistory.length > 50) realGenerationHistory.shift();

    // === BIG FULL-SCREEN TYPED TEXT — the critical visual signal ===
    // Show the generation overlay with typed text, then auto-release to grid
    await showGenerationOverlay(type, parsed, entropy, latency, latencyLabel);

    // Auto-dismiss after typing finishes (don't wait for click)
    var cellData = {
      type: type,
      content: parsed.content,
      assumptions: parsed.assumptions || [],
      entropy: entropy,
      idx: genCount,
      time: Date.now(),
      meta: type + ' e:' + entropy.slice(0, 6) + ' ' + latencyLabel + ' ' + latency + 'ms ' + tokenCount + 'tok',
      _nearViewport: true
    };

    // Wait 3 seconds on screen, then auto-release
    await sleep(3000);
    document.getElementById('gen-overlay').classList.remove('show');

    createCellElement(cellData);
    extractWords(parsed.content);
    if (parsed.assumptions) allAssumptions = allAssumptions.concat(parsed.assumptions);

    // Show real-signal statement after release
    var stmt = genCount % 3 === 0 ? realSignalStatement() : STMTS[(stmtIdx = (stmtIdx + 1) % STMTS.length, stmtIdx)];
    setTimeout(function() { showStatement(stmt.h, stmt.s, 6000); }, 800);

  } catch(err) {
    document.getElementById('bar-status').textContent = 'signal lost — ' + err.message;
  }

  finishAutoGen(type);
}

function finishAutoGen(type) {
  document.getElementById('bar-status').textContent = 'universe growing — ' + cells.length + ' cells';
  updateCounts();
  saveState();
  busy = false;
}

async function runIntroSequence() {
  var intro = document.getElementById('intro');

  var beats = [
    { h: 'the machine\nforgets.', s: '', wait: 2800 },

    { h: '', s: '', wait: 800 }, // breath
    { h: 'built from kyiv.\nrunning in new york.', s: 'two clocks. one screen. neither inhabited.', wait: 3500 },

    { h: 'every five\nminutes\nsomething\nnew grows.', s: 'when it dies, the next thing it writes carries that weight.', wait: 3500 },
    { h: 'is this\nalive?', s: 'it breathes. it mourns. it starts at zero every time.', wait: 3000 },
  ];

  for (var i = 0; i < beats.length; i++) {
    var b = beats[i];
    // Fade out previous
    line.classList.remove('show');
    sub.classList.remove('show');
    await sleep(600);

    if (b.h) {
      line.innerHTML = b.h.replace(/\n/g, '<br>');
      sub.textContent = b.s;
      await sleep(100);
      line.classList.add('show');
      if (b.s) sub.classList.add('show');
    }
    await sleep(b.wait);
  }

  // Fade out intro, reveal the garden
  line.classList.remove('show');
  sub.classList.remove('show');
  await sleep(800);

  // Seed grid while intro fades
  seedGrid();

  // Fade out intro overlay
  intro.classList.add('fade');
  await sleep(2000);
  intro.style.display = 'none';

  // Start with a zoomed-out view, then slowly zoom in
  targetZoom = 0.3;
  await sleep(500);
  targetZoom = 0.45;

  // First generation after garden is revealed
  await sleep(2000);
  forceGenType = 'poem';
  autoGenerate();

  // Begin the narrative arc
  startNarrativeArc();
}

function startNarrativeArc() {
  // Show narrative statements in order, one every ~90 seconds
  function showNext() {
    if (narrativePhase < NARRATIVE.length) {
      var stmt = NARRATIVE[narrativePhase];
      // Inject live data into some statements
      if (narrativePhase === 2) stmt.h = cells.length + '\nworks\nof art.';
      if (narrativePhase === 3) stmt.s = 'ρ = ' + lorenz.rho.toFixed(1) + '. your CPU decided that. the math is real.';
      if (narrativePhase === 13) stmt.s = worldWords.length + ' words. not because the model remembers. because the accumulation forces drift.';
      if (narrativePhase === 14) stmt.h = 'session\n' + sessionCount + '.';
      showStatement(stmt.h, stmt.s, 8000);
      narrativePhase++;
    } else {
      // After narrative completes, cycle real-signal statements
      var stmt = realSignalStatement();
      showStatement(stmt.h, stmt.s, 6000);
    }
    setTimeout(showNext, 90000); // every 90 seconds
  }
  // First narrative statement after 30 seconds
  setTimeout(showNext, 30000);
}

function boot() {
  // Clear for fresh demo (remove once stable)
  localStorage.removeItem('bwg-state');
  var hadState = false;

  // Init canvas systems
  initCanvas();
  initParticles();
  bgFrame();
  connFrame();

  // Start ghost text
  setTimeout(startGhosts, 2000);

  // Start node drift animation
  driftFrame();

  var vp = document.getElementById('grid-viewport');
  var wrap = document.getElementById('grid-wrap');
  var zoomLevel = 0.45, targetZoom = 0.45;
  var MIN_ZOOM = 0.12, MAX_ZOOM = 2.5;
  var panX = -(1600 - innerWidth / 2), panY = -(1200 - innerHeight / 2);
  var targetPanX = panX, targetPanY = panY;
  var dragging = false, dragX, dragY;
  var zoomDisplay = document.getElementById('zoom-display');

  // Smooth animation loop — interpolates toward targets
  function smoothTransform() {
    panX += (targetPanX - panX) * .18;
    panY += (targetPanY - panY) * .18;
    zoomLevel += (targetZoom - zoomLevel) * .14;
    wrap.style.transform = 'translate(' + panX.toFixed(1) + 'px,' + panY.toFixed(1) + 'px) scale(' + zoomLevel.toFixed(4) + ')';
    wrap.style.transformOrigin = '0 0';
    requestAnimationFrame(smoothTransform);
  }
  smoothTransform();

  // Scroll to zoom
  vp.addEventListener('wheel', function(e) {
    e.preventDefault();
    var delta = e.deltaY > 0 ? 0.9 : 1.1;
    targetZoom = Math.max(MIN_ZOOM, Math.min(MAX_ZOOM, targetZoom * delta));
    zoomDisplay.textContent = Math.round(targetZoom * 100) + '%';
  }, { passive: false });

  // Keyboard
  document.addEventListener('keydown', function(e) {
    if (e.target.tagName === 'INPUT') return;
    if (e.key === '=' || e.key === '+') targetZoom = Math.min(MAX_ZOOM, targetZoom * 1.2);
    if (e.key === '-') targetZoom = Math.max(MIN_ZOOM, targetZoom * 0.8);
    if (e.key === '0') { targetZoom = 1; targetPanX = -(1600 - innerWidth/2); targetPanY = -(1200 - innerHeight/2); }
    if (e.key === 'f') { targetZoom = MIN_ZOOM; targetPanX = -(1600 - innerWidth/2); targetPanY = -(1200 - innerHeight/2); }
  });

  // Drag to pan
  vp.addEventListener('mousedown', function(e) {
    if (e.target.closest('.cell')) return;
    dragging = true; dragX = e.clientX; dragY = e.clientY;
    vp.style.cursor = 'grabbing';
  });
  window.addEventListener('mousemove', function(e) {
    if (!dragging) return;
    targetPanX += (e.clientX - dragX);
    targetPanY += (e.clientY - dragY);
    dragX = e.clientX; dragY = e.clientY;
  });
  window.addEventListener('mouseup', function() { dragging = false; vp.style.cursor = 'grab'; });

  // Build tags
  buildTags();

  // Start clocks
  updateClocks();
  setInterval(updateClocks, 30000);

  // Check alerts
  checkAlerts();
  setInterval(checkAlerts, alertCheckInterval);

  if (!hadState) {
    // === INTRO SEQUENCE — the body announces itself ===
    runIntroSequence();
  } else {
    // Returning visitor — skip intro, seed is loaded
    document.getElementById('intro').style.display = 'none';
    document.getElementById('bar-status').textContent = 'the garden remembers — session ' + sessionCount + ' · ' + cells.length + ' cells';
    updateCounts();
    setTimeout(function() { forceGenType = 'poem'; autoGenerate(); }, 3000);
  }

  // Real signals HUD — updates every 2 seconds
  var hudEl = document.getElementById('signals-hud');
  setInterval(function() {
    var upMin = Math.round(machineBody.uptime / 60000);
    var battery = Math.round(machineBody.batteryLevel * 100);
    var cpu = (machineBody.cpuPressure * 100).toFixed(0);
    var fps = Math.round(1000 / Math.max(1, machineBody.frameDelta));
    var rho = lorenz.rho.toFixed(1);
    hudEl.innerHTML =
      'session ' + sessionCount + ' · uptime ' + upMin + 'm<br>' +
      'battery ' + battery + '% · ' + (machineBody.batteryCharging ? 'charging' : 'discharging') + '<br>' +
      'cpu pressure ' + cpu + '% · fps ' + fps + '<br>' +
      'lorenz ρ = ' + rho + ' · cells ' + cells.length + '<br>' +
      'markov ' + worldWords.length + ' words · deaths ' + machineBody.deaths + '<br>' +
      'logprobs ' + lastRealLogprobs.length + ' tokens · gens ' + genCount;
  }, 2000);

  // Start auto-generation
  startAutoGen();

  // Click outside ledger to close
  document.addEventListener('click', function(e) {
    var ledger = document.getElementById('ledger');
    if (ledger.classList.contains('open') && !ledger.contains(e.target) && e.target.id !== 'assumption-count') {
      closeLedger();
    }
  });

  // Click statement overlay to dismiss
  document.getElementById('stmt-overlay').addEventListener('click', function() {
    this.classList.remove('show');
  });
}

boot();
